apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring
resources:
  - namespace.yaml
  - alloy/configmap.yaml
  - alloy/daemonset.yaml
  - alloy/service.yaml
  - grafana/configmap-datasources.yaml
  - grafana/deployment.yaml
  - grafana/service.yaml
  - kube-state-metrics/deployment.yaml
  - kube-state-metrics/service.yaml
  - loki/configmap.yaml
  - loki/statefulset.yaml
  - loki/service.yaml
  - node-exporter/daemonset.yaml
  - node-exporter/service.yaml
  - prometheus/configmap.yaml
  - prometheus/serviceaccount.yaml
  - prometheus/clusterrole.yaml
  - prometheus/clusterrolebinding.yaml
  - prometheus/pvc.yaml
  - prometheus/statefulset.yaml
  - prometheus/service.yaml
  - pyroscope/configmap.yaml
  - pyroscope/statefulset.yaml
  - pyroscope/service.yaml
  - tempo/configmap.yaml
  - tempo/statefulset.yaml
  - tempo/service.yaml
EOF

# Create dummy kube-state-metrics serviceaccount (needed for helm release leftovers)
kubectl delete serviceaccount -n monitoring kube-state-metrics --ignore-not-found 2>&1 || true
kubectl delete serviceaccount -n monitoring node-exporter --ignore-not-found 2>&1 || true
kubectl delete serviceaccount -n monitoring prometheus-operator --ignore-not-found 2>&1 || true
kubectl delete clusterrole prometheus --ignore-not-found 2>&1 || true
kubectl delete clusterrolebinding prometheus --ignore-not-found 2>&1 || true

# Apply what's missing
kubectl apply -f prometheus/serviceaccount.yaml 2>&1 || true
kubectl apply -f prometheus/clusterrole.yaml 2>&1 || true
kubectl apply -f prometheus/clusterrolebinding.yaml 2>&1 || true

git add -A && git commit -m "refactor: remove prometheus operator, raw statefulset" && git push 2>&1 | tail -2

sleep 10
echo ""
echo "=== PVCs ==="
kubectl get pvc -n monitoring 2>&1
echo ""
echo "=== Prometheus ==="
kubectl get pods -n monitoring -l app=prometheus 2>&1