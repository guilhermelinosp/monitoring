name: Deploy monitoring stack

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: runner-monitoring
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML
        run: |
          kubectl kustomize . > /dev/null || { echo "kustomize build failed"; exit 1; }
          echo "✅ Manifests valid"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: runner-monitoring
    steps:
      - uses: actions/checkout@v4
      - name: Deploy monitoring stack
        run: |
          kubectl apply --server-side -f https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.92.1/stripped-down-crds.yaml
          kubectl apply -k .
          echo "✅ Monitoring stack deployed"
