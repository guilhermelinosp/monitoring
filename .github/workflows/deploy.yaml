name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      - name: Validate YAML syntax
        run: |
          for f in $(find . -name "*.yaml" -not -path "./.github/*"); do
            python3 -c "import yaml; yaml.safe_load(open('$f'))" 2>/dev/null \
              && echo "  ✅ $f" \
              || echo "  ❌ $f"
          done

      - name: Validate kustomize build
        run: |
          kubectl kustomize . > /dev/null && echo "✅ kustomize build OK"

  sync:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4

      - name: Trigger ArgoCD sync
        run: |
          kubectl patch application -n argocd monitoring --type=merge \
            -p='{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          echo "⏳ Aguardando sync..."
          for i in $(seq 1 30); do
            STATUS=$(kubectl get application -n argocd monitoring -o jsonpath='{.status.sync.status}' 2>/dev/null)
            HEALTH=$(kubectl get application -n argocd monitoring -o jsonpath='{.status.health.status}' 2>/dev/null)
            echo "  Sync: $STATUS | Health: $HEALTH"
            [ "$STATUS" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && break
            sleep 5
          done
          echo "✅ Monitoring synced"
