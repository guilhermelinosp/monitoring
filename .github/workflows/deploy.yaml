name: Deploy monitoring (raw manifests)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Validate YAML & kustomize
        run: kubectl kustomize . > /dev/null && echo "✅ Valid"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Apply CRDs
        run: kubectl apply --server-side -f https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.92.1/stripped-down-crds.yaml
      - name: Apply manifests
        run: kubectl apply -k .
      - name: Restart operator
        run: kubectl delete po -n monitoring -l app=prometheus-operator
