apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
    common:
      ring:
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /var/loki
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
      max_chunk_age: 15m
    storage_config:
      tsdb_shipper:
        active_index_directory: /var/loki/tsdb-shipper-active
        cache_location: /var/loki/tsdb-shipper-cache
      filesystem:
        directory: /var/loki/chunks
    querier:
      max_concurrent: 8
    limits_config:
      reject_old_samples: false
      ingestion_rate_mb: 10
      ingestion_burst_size_mb: 20
EOF

# Update Alloy to only follow new logs (tail_from_end)
cat > alloy/configmap.yaml << 'YAML'
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |
    logging {
      level = "warn"
    }

    discovery.kubernetes "pods" {
      role = "pod"
    }

    prometheus.scrape "default" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [prometheus.remote_write.default.receiver]
    }
    prometheus.remote_write "default" {
      endpoint {
        url = "http://prometheus.monitoring:9090/api/v1/write"
      }
    }

    loki.source.kubernetes "all" {
      targets    = discovery.kubernetes.pods.targets
      forward_to = [loki.write.default.receiver]
      tail_only_new = true
    }
    loki.write "default" {
      endpoint {
        url = "http://loki.monitoring:3100/loki/api/v1/push"
      }
    }

    otelcol.receiver.otlp "default" {
      output {
        traces = [otelcol.processor.batch.default.input]
      }
    }
    otelcol.processor.batch "default" {
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }
    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "tempo.monitoring:4317"
      }
    }
