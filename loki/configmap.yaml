apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: monitoring
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
    common:
      ring:
        kvstore:
          store: inmemory
      replication_factor: 1
      path_prefix: /tmp/loki
    schema_config:
      configs:
        - from: 2020-10-24
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: inmemory
    storage_config:
      tsdb_shipper:
        active_index_directory: /tmp/loki/tsdb-shipper-active
        cache_location: /tmp/loki/tsdb-shipper-cache
      filesystem:
        directory: /tmp/loki/chunks
    querier:
      max_concurrent: 8
