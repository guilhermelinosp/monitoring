apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  serviceName: pyroscope
  template:
    metadata: {}
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: pyroscope
        image: grafana/pyroscope:2.1.0
        args:
        - --config.file=/etc/pyroscope/pyroscope.yaml
        env:
        - name: PYROSCOPE_STORAGE_PATH
          value: /var/pyroscope
        ports:
        - name: http
          containerPort: 4040
        volumeMounts:
        - name: config
          mountPath: /etc/pyroscope
        - name: storage
          mountPath: /var/pyroscope
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: pyroscope-config
  volumeClaimTemplates:
  - metadata:
      name: storage
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: longhorn
      resources:
        requests:
          storage: 10Gi
