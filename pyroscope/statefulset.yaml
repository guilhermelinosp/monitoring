apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pyroscope
  namespace: monitoring
  labels:
    app: pyroscope
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  serviceName: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: ghcr.io/grafana/pyroscope:2.1.0
          args:
            - --config.file=/etc/pyroscope/pyroscope.yaml
          ports:
            - name: http
              containerPort: 4040
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
            - name: storage
              mountPath: /var/pyroscope
          securityContext:
            runAsUser: 0
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
