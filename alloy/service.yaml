apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: monitoring
  labels:
    app: alloy
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
    - name: metrics
      port: 12345
      targetPort: metrics
  selector:
    app: alloy
EOF

kubectl apply -f alloy/service.yaml 2>&1 | tail -1

git add -A && git commit -m "feat: alloy collects all pod logs via loki" && git push 2>&1 | tail -2

echo ""
echo "=== Alloy pods ==="
kubectl get pods -n monitoring -l app=alloy 2>&1