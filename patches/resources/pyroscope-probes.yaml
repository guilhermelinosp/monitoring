apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pyroscope
spec:
  template:
    spec:
      containers:
        - name: pyroscope
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
